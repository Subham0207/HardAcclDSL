AWSTemplateFormatVersion: '2010-09-09'
Description: HardAcclDSL backend stack (Lambda container + HTTP API Gateway + IAM role)

Parameters:
  LambdaImageUri:
    Type: String
    Description: ECR image URI for the backend Lambda function.
  LambdaFunctionName:
    Type: String
    Default: hardaccldsl-api
    Description: Name of the Lambda function.
  HttpApiName:
    Type: String
    Default: hardaccldsl-http-api
    Description: Name of the API Gateway HTTP API.
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: Allowed CORS origin for frontend requests.

Resources:
  HardAcclDSLBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: hardaccldsl

  HardAcclDSLTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HardAcclDSL
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user
          AttributeType: S
        - AttributeName: scriptname
          AttributeType: S
      KeySchema:
        - AttributeName: user
          KeyType: HASH
        - AttributeName: scriptname
          KeyType: RANGE

  BackendLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: HardAcclDslDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource: !GetAtt HardAcclDSLTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${HardAcclDSLBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt HardAcclDSLBucket.Arn

  BackendLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref LambdaImageUri
      Role: !GetAtt BackendLambdaExecutionRole.Arn
      Environment:
        Variables:
          CORS_ALLOWED_ORIGIN: !Ref AllowedOrigin
          SCRIPT_BUCKET_NAME: !Ref HardAcclDSLBucket
          SCRIPT_TABLE_NAME: !Ref HardAcclDSLTable
      Timeout: 30
      MemorySize: 1024
      Architectures:
        - x86_64

  BackendHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref HttpApiName
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'

  BackendLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BackendHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BackendLambdaFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  BackendRouteRoot:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BackendHttpApi
      RouteKey: ANY /
      Target: !Sub integrations/${BackendLambdaIntegration}

  BackendRouteProxy:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BackendHttpApi
      RouteKey: ANY /{proxy+}
      Target: !Sub integrations/${BackendLambdaIntegration}

  BackendStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref BackendHttpApi
      StageName: '$default'
      AutoDeploy: true

  BackendLambdaPermissionForApiGateway:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendLambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BackendHttpApi}/*/*

Outputs:
  HardAcclDSLApiUrl:
    Description: Public URL for the HTTP API.
    Value: !GetAtt BackendHttpApi.ApiEndpoint

