name: Deploy Backend to AWS Lambda

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "src/HardAcclDslApi/**"
      - "HardAcclDSL.sln"
      - ".github/workflows/deploy-backend-lambda.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: HardAcclDSL
  BACKEND_STACK_NAME: HardAcclDSL
  LAMBDA_FUNCTION_NAME: HardAcclDSLLambda
  HTTP_API_NAME: HardAcclDSLApi
  ALLOWED_ORIGIN: https://${{ github.repository_owner }}.github.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" \
          || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build and push container image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f src/HardAcclDslApi/Dockerfile.lambda -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation.yml \
            --stack-name "$BACKEND_STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              LambdaImageUri="$IMAGE_URI" \
              LambdaFunctionName="$LAMBDA_FUNCTION_NAME" \
              HttpApiName="$HTTP_API_NAME" \
              AllowedOrigin="$ALLOWED_ORIGIN" \
            --region "$AWS_REGION"