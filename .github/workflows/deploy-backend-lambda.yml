name: Deploy Backend to AWS Lambda

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "src/HardAcclDslApi/**"
      - "infra/cloudformation.yml"
      - "HardAcclDSL.sln"
      - ".github/workflows/deploy-backend-lambda.yml"

permissions:
  id-token: write
  contents: read
  actions: write # Needed to create/update HARDACCLDSL_API_URL repository Actions variable via GitHub API.

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hardaccldsl
  BACKEND_STACK_NAME: HardAcclDSL
  LAMBDA_FUNCTION_NAME: HardAcclDSLLambda
  HTTP_API_NAME: HardAcclDSLApi
  ALLOWED_ORIGIN: https://${{ github.repository_owner }}.github.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" \
          || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build and push container image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f src/HardAcclDslApi/Dockerfile.lambda -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation.yml \
            --stack-name "$BACKEND_STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              LambdaImageUri="$IMAGE_URI" \
              LambdaFunctionName="$LAMBDA_FUNCTION_NAME" \
              HttpApiName="$HTTP_API_NAME" \
              AllowedOrigin="$ALLOWED_ORIGIN" \
            --region "$AWS_REGION"

      - name: Export API URL to HARDACCLDSL_API_URL variable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$BACKEND_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='HardAcclDSLApiUrl'].OutputValue | [0]" \
            --output text)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "Could not resolve HardAcclDSLApiUrl output from stack $BACKEND_STACK_NAME"
            exit 1
          fi

          API_URL=${API_URL%/}
          VAR_NAME="HARDACCLDSL_API_URL"
          API_BASE="https://api.github.com/repos/${{ github.repository }}"

          UPDATE_STATUS=$(curl -s -o /tmp/update_response.json -w "%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API_BASE/actions/variables/$VAR_NAME" \
            -d "{\"name\":\"$VAR_NAME\",\"value\":\"$API_URL\"}")

          if [ "$UPDATE_STATUS" = "204" ]; then
            echo "Updated $VAR_NAME to $API_URL"
            exit 0
          fi

          CREATE_STATUS=$(curl -s -o /tmp/create_response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API_BASE/actions/variables" \
            -d "{\"name\":\"$VAR_NAME\",\"value\":\"$API_URL\"}")

          if [ "$CREATE_STATUS" = "201" ]; then
            echo "Created $VAR_NAME as $API_URL"
            exit 0
          fi

          echo "Failed to set $VAR_NAME. PATCH status: $UPDATE_STATUS, POST status: $CREATE_STATUS"
          cat /tmp/update_response.json || true
          cat /tmp/create_response.json || true
          exit 1