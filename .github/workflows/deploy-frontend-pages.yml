name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "visualscript/**"
      - ".github/workflows/deploy-frontend-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visualscript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: visualscript/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          VITE_API_BASE_URL: ${{ vars.HARDACCLDSL_API_URL }}
        run: |
          yarn tsc -b
          yarn vite build --base="/$REPO_NAME/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: visualscript/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
